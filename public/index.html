<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoop Trains - Host</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #12121f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; padding: 20px; }
  #game-canvas { display: block; background: #1a1a2e; border-radius: 12px; cursor: none; max-width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  #ui { display: flex; justify-content: center; align-items: center; padding: 10px 16px; background: rgba(255,255,255,0.06); border-radius: 12px; margin-bottom: 10px; flex-wrap: wrap; gap: 16px; width: 680px; max-width: 100%; }
  .player-info { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; color: rgba(255,255,255,0.8); }
  .player-badge { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
  #game-wrap { position: relative; width: 680px; max-width: 100%; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: rgba(26,26,46,0.88); border-radius: 12px; z-index: 10; }
  #overlay h2 { color: #e8e8f0; font-size: 32px; font-weight: bold; }
  .btn { background: #FFD100; border: none; color: #0A0E1A; font-weight: bold; border-radius: 8px; padding: 12px 32px; font-size: 18px; cursor: pointer; }
</style>
</head>
<body>

<div id="ui">Loading players...</div>

<div id="game-wrap">
  <canvas id="game-canvas" width="680" height="420"></canvas>
  <div id="overlay" style="display: flex;">
    <h2 id="win-text">Get Ready!</h2>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
socket.emit('host:register');

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 680, H = 420;
const HOOPS = [{ x: 170, y: 210, r: 120 }, { x: 340, y: 210, r: 120 }, { x: 510, y: 210, r: 120 }];
const STAR_COLOR = '#f5e56e';
const SWITCH_COOL = 600;

let players = [], stars = [], gameActive = false, animId, lastTime, frameTime = 0;

function hexToRgba(hex, alpha) {
  let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

fetch('/api/lobby').then(r => r.json()).then(data => {
  const ui = document.getElementById('ui');
  ui.innerHTML = '';

  players = data.players.map((p, i) => {
    ui.innerHTML += `<div class="player-info"><span class="player-badge" style="background:${p.color}"></span> ${p.name}: <span id="score-${p.id}">0</span></div>`;
    return {
      id: p.id, name: p.name, color: p.color,
      hoop: i % 3, angle: Math.random() * Math.PI * 2,
      speed: 0.015 + (Math.random() * 0.005), dir: i % 2 === 0 ? 1 : -1,
      score: 0, switchCooldown: 0,
      trail: Array.from({length: 12}, () => ({x: 0, y: 0})), trailIdx: 0, trailLen: 0,
      pos: {x: 0, y: 0}
    };
  });

  document.getElementById('overlay').style.display = 'none';
  initGame();
});

function initGame() {
  spawnStars();
  gameActive = true;
  if (!animId) { lastTime = performance.now(); requestAnimationFrame(loop); }
}

function spawnStars() {
  stars = [];
  HOOPS.forEach((h, i) => {
    for (let s = 0; s < 2; s++) {
      stars.push({ hoop: i, angle: Math.random() * Math.PI * 2, collected: false });
    }
  });
}

function getPos(hoop, angle) {
  const h = HOOPS[hoop]; return { x: h.x + Math.cos(angle) * h.r, y: h.y + Math.sin(angle) * h.r };
}

socket.on('game:tap', ({ id }) => {
  if (!gameActive) return;
  const p = players.find(x => x.id === id);
  if (p) trySwitch(p);
});

function trySwitch(p) {
  if (p.switchCooldown > 0) return;
  const pos = getPos(p.hoop, p.angle);

  // Find nearest other hoop — no proximity gate, always switch
  let best = null, bestDist = Infinity;
  HOOPS.forEach((h, i) => {
    if (i === p.hoop) return;
    const d = Math.hypot(pos.x - h.x, pos.y - h.y);
    if (d < bestDist) { bestDist = d; best = i; }
  });

  if (best !== null) {
    p.angle = Math.atan2(pos.y - HOOPS[best].y, pos.x - HOOPS[best].x);
    p.hoop = best;
    p.switchCooldown = SWITCH_COOL;
  }
}

function drawHoop(h) {
  ctx.save(); ctx.strokeStyle = 'rgba(180,180,220,0.18)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
}

function drawStar(s) {
  if (s.collected) return;
  const h = HOOPS[s.hoop];
  const x = h.x + Math.cos(s.angle) * h.r, y = h.y + Math.sin(s.angle) * h.r;
  ctx.save(); ctx.translate(x, y); ctx.rotate(frameTime * 0.002);
  ctx.fillStyle = STAR_COLOR;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? 9 : 4, a = (i / 10) * Math.PI * 2 - Math.PI / 2;
    i === 0 ? ctx.moveTo(r * Math.cos(a), r * Math.sin(a)) : ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
  }
  ctx.closePath(); ctx.fill(); ctx.restore();
}

function drawTrain(p) {
  const pos = p.pos;

  // Circular buffer trail — no push/shift allocation
  p.trail[p.trailIdx].x = pos.x;
  p.trail[p.trailIdx].y = pos.y;
  p.trailIdx = (p.trailIdx + 1) % 12;
  if (p.trailLen < 12) p.trailLen++;

  ctx.save();
  for (let i = 0; i < p.trailLen; i++) {
    const idx = (p.trailIdx - p.trailLen + i + 12) % 12;
    const pt = p.trail[idx];
    const t = (i + 1) / p.trailLen;
    ctx.fillStyle = hexToRgba(p.color, t * 0.35);
    ctx.beginPath(); ctx.arc(pt.x, pt.y, 2.5 * t, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  const h = HOOPS[p.hoop];
  const tang = Math.atan2(pos.y - h.y, pos.x - h.x) + Math.PI / 2 * p.dir;

  ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(tang);
  ctx.fillStyle = p.color;
  ctx.beginPath(); ctx.roundRect(-7, -5, 14, 10, 3); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(5, 0, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function checkCollect(p) {
  const px = p.pos.x, py = p.pos.y;
  stars.forEach(s => {
    if (s.collected || s.hoop !== p.hoop) return;
    const sh = HOOPS[s.hoop];
    const sx = sh.x + Math.cos(s.angle) * sh.r, sy = sh.y + Math.sin(s.angle) * sh.r;
    const dx = px - sx, dy = py - sy;
    if (dx * dx + dy * dy < 324) { // 18² — no sqrt needed
      s.collected = true; p.score++;
      document.getElementById(`score-${p.id}`).textContent = p.score;
      setTimeout(() => { s.hoop = Math.floor(Math.random() * 3); s.angle = Math.random() * Math.PI * 2; s.collected = false; }, 1800);
      if (p.score >= 5) showWin(p);
    }
  });
}

function showWin(winner) {
  gameActive = false;
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  document.getElementById('win-text').innerHTML = `<span style="color:${winner.color}">${winner.name} Wins!</span>`;

  setTimeout(() => {
    socket.emit('host:game-over');
    window.location.href = '/display';
  }, 5000);
}

function update(dt) {
  players.forEach((p) => {
    p.angle += p.speed * p.dir;
    if (p.switchCooldown > 0) p.switchCooldown -= dt;
    // Cache position once — reused by drawTrain and checkCollect
    const h = HOOPS[p.hoop];
    p.pos.x = h.x + Math.cos(p.angle) * h.r;
    p.pos.y = h.y + Math.sin(p.angle) * h.r;
    checkCollect(p);
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, W, H);
  HOOPS.forEach(h => drawHoop(h));
  stars.forEach(s => drawStar(s));
  if (gameActive) players.forEach(p => drawTrain(p));
}

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = ts - lastTime; lastTime = ts;
  frameTime = ts;
  if (gameActive) update(dt);
  draw();
  animId = requestAnimationFrame(loop);
}

// If this browser has a player identity, add a tap zone over the canvas
const myId = sessionStorage.getItem('th_playerId');
if (myId) {
  const ctrl = document.createElement('div');
  ctrl.style.cssText = [
    'position:fixed', 'bottom:0', 'left:0', 'right:0', 'height:45vh',
    'display:flex', 'flex-direction:column', 'align-items:center', 'justify-content:center',
    'background:rgba(10,14,26,0.75)', 'cursor:pointer', 'z-index:20',
    'user-select:none', '-webkit-user-select:none', 'transition:background 0.1s'
  ].join(';');
  ctrl.innerHTML = '<div style="font-size:64px;font-weight:900;color:#FFD100;letter-spacing:2px">TAP</div>' +
                   '<div style="font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px">to hop tracks</div>';

  function doTap(e) {
    e.preventDefault();
    socket.emit('player:tap', { playerId: myId });
    ctrl.style.background = 'rgba(29,158,117,0.55)';
    setTimeout(() => { ctrl.style.background = 'rgba(10,14,26,0.75)'; }, 130);
  }
  ctrl.addEventListener('click', doTap);
  ctrl.addEventListener('touchstart', doTap, { passive: false });
  document.body.appendChild(ctrl);
}

socket.on('game:return-to-lobby', () => {
  window.location.href = sessionStorage.getItem('th_playerId') ? '/lobby' : '/display';
});;
</script>
</body>
</html>
